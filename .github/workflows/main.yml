name: PC Gamer Virtual Moonlight

on: 
  workflow_dispatch:

jobs:
  deploy_vm:
    runs-on: windows-latest
    
    steps:
    - name: Instalar Monitor Virtual Estable
      run: |
        echo "Configurando pantalla virtual directa..."
        New-Item -ItemType Directory -Force -Path "C:\VirtualDisplay" | Out-Null
        
        $url = "https://github.com"
        $zip = "C:\VirtualDisplay\driver.zip"
        
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Invoke-WebRequest -Uri $url -OutFile $zip
        
        $shell = New-Object -ComObject Shell.Application
        $zipFolder = $shell.NameSpace($zip)
        $destFolder = $shell.NameSpace("C:\VirtualDisplay")
        $destFolder.CopyHere($zipFolder.Items(), 0x10)
        echo "Monitor virtual listo."

    - name: Configurar e Instalar Servidor Sunshine Portatil
      run: |
        echo "Descargando Sunshine oficial de manera portable..."
        New-Item -ItemType Directory -Force -Path "C:\Sunshine" | Out-Null
        
        # Descargamos la versión portable en ZIP para evitar instaladores que se pierden
        $sunshineUrl = "https://github.com"
        $sunshineZip = "C:\Sunshine\sunshine.zip"
        
        Invoke-WebRequest -Uri $sunshineUrl -OutFile $sunshineZip
        
        # Extraemos Sunshine en C:\Sunshine
        $shell = New-Object -ComObject Shell.Application
        $zipFolder = $shell.NameSpace($sunshineZip)
        $destFolder = $shell.NameSpace("C:\Sunshine")
        $destFolder.CopyHere($zipFolder.Items(), 0x10)
        echo "Sunshine extraído correctamente en una ruta fija."

    - name: Configurar Conexión Segura con Ngrok
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        echo "Instalando Ngrok..."
        choco install ngrok -y
        
        # Autenticar token seguro
        ngrok config add-authtoken "$env:NGROK_AUTH_TOKEN"
        
        echo "Iniciando Sunshine desde la ruta fija garantizada..."
        # Ahora la ruta es 100% real y fija en el disco C:
        Start-Process -FilePath "C:\Sunshine\sunshine.exe" -WindowStyle Hidden
        Start-Sleep -Seconds 10
        
        echo "=== INICIANDO TÚNEL TCP EN PUERTO 47990 ==="
        # Ejecutamos Ngrok mostrando la IP directamente en la consola de GitHub Actions
        ngrok tcp 47990 --log=stdout
